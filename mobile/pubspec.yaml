name: chea
description: Official mobile application of the Chemical Engineering Students Association.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── State management & DI ──────────────────────────────────────────────────
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5

  # ── Navigation ─────────────────────────────────────────────────────────────
  go_router: ^17.0.0

  # ── Network ────────────────────────────────────────────────────────────────
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # ── Serialization / code-gen ──────────────────────────────────────────────
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # ── Local storage ─────────────────────────────────────────────────────────
  flutter_secure_storage: ^10.3.1
  hive_flutter: ^1.1.0

  # ── Images ────────────────────────────────────────────────────────────────
  cached_network_image: ^3.4.1

  # ── Firebase ──────────────────────────────────────────────────────────────
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.1

  # ── UI helpers ────────────────────────────────────────────────────────────
  flutter_markdown: ^0.7.4
  shimmer: ^3.0.0
  url_launcher: ^6.3.1
  share_plus: ^12.0.2
  file_picker: ^11.0.2
  image_picker: ^1.1.2
  intl: ^0.20.2
  timeago: ^3.7.0
  add_2_calendar: ^3.0.1
  qr_flutter: ^4.1.0

  # ── Icons ─────────────────────────────────────────────────────────────────
  hugeicons: ^1.1.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  freezed: ^3.1.0
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
