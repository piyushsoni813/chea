org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true

# Kotlin incremental compilation fails when plugin sources (pub cache on C:\) and
# build outputs (project on D:\) are on different Windows drive roots.
# VfsUtilCore.getRelativePath() throws IllegalArgumentException for cross-drive paths.
kotlin.incremental=false
kotlin.incremental.useClasspathSnapshot=false
