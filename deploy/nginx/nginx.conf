# Reverse proxy for the CHEA backend.
# Proxies the API to the FastAPI container and serves uploaded files directly
# off the shared volume so Python never sits in the static-file path.

upstream chea_backend {
    server backend:8000;
}

server {
    listen 80;
    server_name _;

    # Allow reasonably large uploads (keep in step with MAX_UPLOAD_MB).
    client_max_body_size 30M;

    # Serve uploaded files straight from disk.
    location /static/ {
        alias /var/www/uploads/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Everything else goes to the API (includes /api, /docs, /health, /).
    location / {
        proxy_pass         http://chea_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
    }
}
